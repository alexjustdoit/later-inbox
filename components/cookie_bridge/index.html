<!DOCTYPE html>
<html>
<head>
<script>
  function send(type, data) {
    window.parent.postMessage(
      Object.assign({ isStreamlitMessage: true, type: type }, data),
      "*"
    );
  }

  window.addEventListener("message", function (event) {
    if (!event.data || event.data.type !== "streamlit:render") return;

    var args = event.data.args || {};

    if (args.action === "set") {
      localStorage.setItem("later_access_token", args.access_token || "");
      localStorage.setItem("later_refresh_token", args.refresh_token || "");
      send("streamlit:setComponentValue", { value: { done: true }, dataType: "json" });
    } else if (args.action === "clear") {
      localStorage.removeItem("later_access_token");
      localStorage.removeItem("later_refresh_token");
      send("streamlit:setComponentValue", { value: { done: true }, dataType: "json" });
    } else {
      // action === "get": read and return stored tokens
      send("streamlit:setComponentValue", {
        value: {
          access_token: localStorage.getItem("later_access_token") || "",
          refresh_token: localStorage.getItem("later_refresh_token") || ""
        },
        dataType: "json"
      });
    }

    send("streamlit:setFrameHeight", { height: 0 });
  });

  send("streamlit:componentReady", { apiVersion: 1 });
  send("streamlit:setFrameHeight", { height: 0 });
</script>
</head>
<body></body>
</html>
